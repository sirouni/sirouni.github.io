<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Can you crack this code?" />

    <title>Code Breaker Challenge</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-align: center; padding: 60px 24px; background: linear-gradient(135deg, #e8f5f3, #f0f4ff); min-height: 100vh; margin: 0; }
        .card { background: white; border-radius: 20px; padding: 40px 24px; max-width: 360px; margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

        h1 { font-size: 24px; margin: 0 0 8px; color: #1a1a1a; }
        p { color: #666; font-size: 15px; line-height: 1.5; }
        .btn { display: inline-block; background: #2a9d8f; color: white; text-decoration: none; padding: 14px 32px; border-radius: 12px; font-weight: 700; font-size: 16px; margin-top: 20px; }
        .btn:hover { background: #238b7e; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔐</div>
        <h1>You've been challenged!</h1>
        <p>Someone challenged you to crack their secret code. Download Code Breaker to accept the challenge.</p>
        <a class="btn" href="https://apps.apple.com/app/id000000000">Download on App Store</a>
    </div>
