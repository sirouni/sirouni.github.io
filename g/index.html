<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>滑木盘 · Woodslide</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: #f3e8d5;
    color: #4a3728;
    text-align: center;
  }
  .container { padding: 2rem; max-width: 420px; }
  .appicon {
    width: 96px; height: 96px; margin: 0 auto 1.2rem; display: block;
    border-radius: 22px; /* iOS squircle-ish corner */
    box-shadow: 0 4px 12px rgba(46,32,20,.18);
  }
  h1 { font-size: 1.6rem; margin: 0 0 .3rem; }
  .sub { font-size: .8rem; letter-spacing: .18em; color: #7a6a58; margin-bottom: 1.2rem; }
  .bar { width: 56px; height: 5px; background: #b25e44; border-radius: 3px; margin: 0 auto 1.2rem; }
  .challenge {
    background: #fffdf8; border: 1px solid rgba(179,155,120,.5);
    border-radius: 14px; padding: .9rem 1.2rem; margin-bottom: 1.4rem;
    font-size: 1.02rem; display: none;
  }
  .cta {
    display: inline-block; background: #b25e44; color: #fffdf8;
    padding: .85rem 2.2rem; border-radius: 12px; text-decoration: none;
    font-weight: 600; box-shadow: 0 3px 8px rgba(178,94,68,.35);
  }
  .note { margin-top: .9rem; font-size: .82rem; color: #7a6a58; }
  .desc { font-size: .95rem; color: #5d4a36; margin: 0 0 1.3rem; }
  .links { margin-top: 1.6rem; font-size: .8rem; }
  .links a { color: #7a6a58; text-decoration: none; margin: 0 .5rem; }
</style>
</head>
<body>
<div class="container">
  <img class="appicon" src="icon.png" alt="滑木盘 Woodslide" width="96" height="96">
  <h1>滑木盘</h1>
  <div class="sub">WOODSLIDE</div>
  <div class="bar"></div>
  <p class="desc">滑动木盘，方块一滑到底。<br>1000 关滑块解谜 · 每日挑战 · 无限模式。<br><span style="font-size:.82rem;color:#7a6a58">Swipe the tray — blocks slide to the end. 1,000 levels · daily challenge · endless.</span></p>
  <div class="challenge" id="challenge"></div>
  <!-- TODO(release): replace href with the App Store link, e.g.
       https://apps.apple.com/app/idXXXXXXXXXX -->
  <a class="cta" id="cta" href="#">即将上架 App Store</a>
  <p class="note">已安装游戏？直接点开分享链接即可进入对应关卡。</p>
  <p class="links"><a href="support/">技术支持 Support</a>·<a href="privacy/">隐私政策 Privacy</a></p>
</div>
<script>
  // Show what the friend is challenging you with
  var q = new URLSearchParams(location.search);
  var el = document.getElementById('challenge');
  if (q.get('daily') !== null) {
    el.textContent = '好友向你发起：每日挑战 #' + q.get('daily');
    el.style.display = 'block';
  } else if (q.get('level')) {
    el.textContent = '好友向你发起：第 ' + q.get('level') + ' 关挑战';
    el.style.display = 'block';
  }
</script>
</body>
</html>
